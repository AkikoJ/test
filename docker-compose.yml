# Optional: local development fallback only.
# Production uses Neon (PostgreSQL) + Upstash (Redis) cloud services.
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wechat_advisor
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - local

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    profiles:
      - local

volumes:
  pgdata:
  redisdata:
